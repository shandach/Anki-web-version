# fly.toml app configuration file generated for anki-web-version on 2026-04-29T21:26:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'anki-web-version'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
[processes]
  app = "fastapi run main.py --host 0.0.0.0 --port 8000"
